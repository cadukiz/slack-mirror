<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Slack Mirror</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a1a2e;
        color: #eee;
        height: 100vh;
        display: flex;
        flex-direction: column;
        -webkit-app-region: drag;
      }
      button, input, select, label { -webkit-app-region: no-drag; }

      /* Title bar area */
      .titlebar {
        height: 38px;
        display: flex;
        align-items: center;
        padding: 0 80px 0 16px;
        background: #0d1117;
        font-size: 13px;
        font-weight: 600;
        color: #888;
        flex-shrink: 0;
      }

      /* Layout: sidebar + main */
      .app-layout {
        display: flex;
        flex: 1;
        overflow: hidden;
        -webkit-app-region: no-drag;
      }

      /* Sidebar */
      .sidebar {
        width: 220px;
        background: #16213e;
        border-right: 1px solid #0f3460;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }
      .sidebar-header {
        padding: 12px 16px 8px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #555;
      }
      .ws-list {
        flex: 1;
        overflow-y: auto;
      }
      .ws-item {
        padding: 10px 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #aaa;
        border-left: 3px solid transparent;
        transition: all 0.15s;
      }
      .ws-item:hover { background: #1a2744; color: #ddd; }
      .ws-item.active {
        background: #1a2744;
        color: #fff;
        border-left-color: #e94560;
      }
      .ws-item .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .ws-item .dot.running { background: #4caf50; }
      .ws-item .dot.stopped { background: #555; }
      .ws-item .ws-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      .sidebar-bottom {
        padding: 12px;
        border-top: 1px solid #0f3460;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .btn-add-ws {
        width: 100%;
        padding: 8px;
        background: #0f3460;
        border: 1px dashed #1a4a7a;
        border-radius: 6px;
        color: #888;
        font-size: 12px;
        cursor: pointer;
        text-align: center;
      }
      .btn-add-ws:hover { background: #1a4a7a; color: #ccc; }

      .startup-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: #666;
        padding: 0 4px;
      }
      .startup-toggle input { width: 14px; height: 14px; }

      /* Main content */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Workspace header */
      .ws-header {
        padding: 16px 20px;
        background: #16213e;
        border-bottom: 1px solid #0f3460;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .ws-header h2 { font-size: 16px; font-weight: 600; flex: 1; }
      .status-badge {
        padding: 3px 10px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
      }
      .status-badge.running { background: #0a3d0a; color: #4caf50; border: 1px solid #4caf50; }
      .status-badge.stopped { background: #3d0a0a; color: #f44336; border: 1px solid #f44336; }

      /* Inner tabs */
      .inner-tabs {
        display: flex;
        background: #16213e;
        border-bottom: 1px solid #0f3460;
      }
      .inner-tab {
        padding: 8px 16px;
        cursor: pointer;
        font-size: 12px;
        color: #666;
        border-bottom: 2px solid transparent;
      }
      .inner-tab:hover { color: #aaa; }
      .inner-tab.active { color: #e94560; border-bottom-color: #e94560; }

      /* Panels */
      .panel { display: none; flex: 1; overflow: auto; padding: 16px 20px; }
      .panel.active { display: flex; flex-direction: column; }

      /* Controls */
      .controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
      button {
        padding: 7px 16px;
        border: none;
        border-radius: 5px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }
      button:active { transform: scale(0.97); }
      .btn-start { background: #4caf50; color: white; }
      .btn-start:hover { background: #45a049; }
      .btn-stop { background: #f44336; color: white; }
      .btn-stop:hover { background: #d32f2f; }
      .btn-sync { background: #2196f3; color: white; }
      .btn-sync:hover { background: #1976d2; }
      .btn-auth { background: #ff9800; color: white; }
      .btn-auth:hover { background: #f57c00; }
      .btn-save { background: #e94560; color: white; }
      .btn-save:hover { background: #c73650; }
      .btn-secondary { background: #333; color: #ccc; }
      .btn-secondary:hover { background: #444; }
      .btn-danger { background: transparent; color: #f44336; border: 1px solid #f44336; }
      .btn-danger:hover { background: #3d0a0a; }

      /* Form */
      .form-group { margin-bottom: 14px; }
      .form-group label {
        display: block;
        font-size: 11px;
        color: #666;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .form-group input {
        width: 100%;
        padding: 9px 12px;
        background: #0f3460;
        border: 1px solid #1a4a7a;
        border-radius: 5px;
        color: #eee;
        font-size: 13px;
        outline: none;
      }
      .form-group input:focus { border-color: #e94560; }
      .form-row { display: flex; gap: 12px; }
      .form-row .form-group { flex: 1; }

      .toggle-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
        font-size: 13px;
        color: #aaa;
      }
      .toggle-row input { width: 16px; height: 16px; }

      /* Logs */
      .log-container {
        flex: 1;
        background: #0d1117;
        border-radius: 6px;
        padding: 10px;
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 11px;
        overflow-y: auto;
        line-height: 1.6;
        min-height: 200px;
      }
      .log-entry { color: #8b949e; }
      .log-entry.error { color: #f85149; }

      /* Auth */
      .auth-box {
        background: #16213e;
        border-radius: 6px;
        padding: 16px;
        margin-bottom: 14px;
      }
      .auth-box p { font-size: 13px; color: #888; margin-bottom: 10px; line-height: 1.5; }
      .auth-box ol { font-size: 13px; color: #aaa; margin: 10px 0; padding-left: 20px; }
      .auth-box ol li { margin-bottom: 4px; }

      /* Empty state */
      .empty-state {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #444;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="titlebar">Slack Mirror</div>

    <div class="app-layout">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">Workspaces</div>
        <div class="ws-list" id="ws-list"></div>
        <div class="sidebar-bottom">
          <div class="btn-add-ws" id="btn-add-ws">+ Add Workspace</div>
          <label class="startup-toggle">
            <input type="checkbox" id="chk-startup" />
            Launch at startup
          </label>
        </div>
      </div>

      <!-- Main -->
      <div class="main" id="main-content">
        <div class="empty-state" id="empty-state">
          Select a workspace or add a new one
        </div>
      </div>
    </div>

    <script>
      let workspaces = [];
      let activeWsId = null;
      let statuses = {};

      // --- Render sidebar ---
      function renderSidebar() {
        const list = document.getElementById("ws-list");
        list.innerHTML = "";
        for (const ws of workspaces) {
          const isRunning = statuses[ws.id]?.running;
          const div = document.createElement("div");
          div.className = `ws-item${ws.id === activeWsId ? " active" : ""}`;
          div.innerHTML = `
            <span class="dot ${isRunning ? "running" : "stopped"}"></span>
            <span class="ws-name">${ws.name}</span>
          `;
          div.addEventListener("click", () => selectWorkspace(ws.id));
          list.appendChild(div);
        }
      }

      // --- Select workspace ---
      function selectWorkspace(id) {
        activeWsId = id;
        renderSidebar();
        renderWorkspacePanel();
      }

      // --- Render workspace panel ---
      function renderWorkspacePanel() {
        const main = document.getElementById("main-content");
        const ws = workspaces.find((w) => w.id === activeWsId);
        if (!ws) {
          main.innerHTML = '<div class="empty-state">Select a workspace or add a new one</div>';
          return;
        }

        const isRunning = statuses[ws.id]?.running;

        main.innerHTML = `
          <div class="ws-header">
            <h2>${ws.name}</h2>
            <span class="status-badge ${isRunning ? "running" : "stopped"}">
              ${isRunning ? "Running" : "Stopped"}
            </span>
          </div>

          <div class="inner-tabs">
            <div class="inner-tab active" data-panel="control">Control</div>
            <div class="inner-tab" data-panel="config">Config</div>
            <div class="inner-tab" data-panel="auth">Auth</div>
            <div class="inner-tab" data-panel="logs">Logs</div>
          </div>

          <!-- Control -->
          <div class="panel active" id="panel-control">
            <div class="controls">
              <button class="btn-start" id="btn-start">Start Auto-Sync</button>
              <button class="btn-stop" id="btn-stop">Stop</button>
              <button class="btn-sync" id="btn-sync-once">Sync Now</button>
            </div>
            <div class="log-container" id="control-logs"></div>
          </div>

          <!-- Config -->
          <div class="panel" id="panel-config">
            <div class="form-group">
              <label>Workspace Name</label>
              <input type="text" id="cfg-name" value="${ws.name}" />
            </div>
            <div class="form-group">
              <label>Slack Workspace URL</label>
              <input type="text" id="cfg-url" value="${ws.slackUrl}" placeholder="https://yourworkspace.slack.com" />
            </div>
            <div class="form-group">
              <label>Obsidian Vault Name</label>
              <input type="text" id="cfg-vault" value="${ws.vault}" />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Channels (comma-separated)</label>
                <input type="text" id="cfg-channels" value="${ws.channels || ""}" placeholder="general, random" />
              </div>
              <div class="form-group">
                <label>Sync Interval (minutes)</label>
                <input type="number" id="cfg-interval" value="${ws.intervalMinutes || 30}" min="1" max="1440" />
              </div>
            </div>
            <div class="toggle-row">
              <input type="checkbox" id="cfg-auto" ${ws.autoSync ? "checked" : ""} />
              <label for="cfg-auto">Auto-sync on app launch</label>
            </div>
            <div class="toggle-row">
              <input type="checkbox" id="cfg-dms" ${ws.syncDMs !== false ? "checked" : ""} />
              <label for="cfg-dms">Sync direct messages</label>
            </div>
            <div class="toggle-row">
              <input type="checkbox" id="cfg-groups" ${ws.syncGroups !== false ? "checked" : ""} />
              <label for="cfg-groups">Sync group messages</label>
            </div>
            <div class="controls">
              <button class="btn-save" id="btn-save">Save Config</button>
              <button class="btn-danger" id="btn-delete">Delete Workspace</button>
            </div>
          </div>

          <!-- Auth -->
          <div class="panel" id="panel-auth">
            <div class="auth-box">
              <p>Authenticate with <strong>${ws.name}</strong> Slack workspace:</p>
              <ol>
                <li>Click <strong>Open Login Browser</strong></li>
                <li>Log into Slack in the browser that opens</li>
                <li>Once logged in, click <strong>Save Session</strong></li>
              </ol>
              <div class="controls">
                <button class="btn-auth" id="btn-auth">Open Login Browser</button>
                <button class="btn-secondary" id="btn-auth-save">Save Session</button>
              </div>
            </div>
          </div>

          <!-- Logs -->
          <div class="panel" id="panel-logs">
            <div class="log-container" id="full-logs"></div>
          </div>
        `;

        // Inner tab switching
        main.querySelectorAll(".inner-tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            main.querySelectorAll(".inner-tab").forEach((t) => t.classList.remove("active"));
            main.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
            tab.classList.add("active");
            document.getElementById(`panel-${tab.dataset.panel}`).classList.add("active");
          });
        });

        // Control buttons
        document.getElementById("btn-start").addEventListener("click", () => window.api.startSync(ws.id));
        document.getElementById("btn-stop").addEventListener("click", () => window.api.stopSync(ws.id));
        document.getElementById("btn-sync-once").addEventListener("click", () => window.api.runOnce(ws.id));

        // Config save
        document.getElementById("btn-save").addEventListener("click", async () => {
          const updated = {
            ...ws,
            name: document.getElementById("cfg-name").value,
            slackUrl: document.getElementById("cfg-url").value,
            vault: document.getElementById("cfg-vault").value,
            channels: document.getElementById("cfg-channels").value,
            intervalMinutes: parseInt(document.getElementById("cfg-interval").value) || 30,
            autoSync: document.getElementById("cfg-auto").checked,
            syncDMs: document.getElementById("cfg-dms").checked,
            syncGroups: document.getElementById("cfg-groups").checked,
          };
          await window.api.saveWorkspace(updated);
          workspaces = await window.api.getWorkspaces();
          renderSidebar();
          renderWorkspacePanel();
        });

        // Delete
        document.getElementById("btn-delete").addEventListener("click", async () => {
          if (confirm(`Delete workspace "${ws.name}"?`)) {
            await window.api.deleteWorkspace(ws.id);
            workspaces = await window.api.getWorkspaces();
            activeWsId = workspaces[0]?.id || null;
            renderSidebar();
            renderWorkspacePanel();
          }
        });

        // Auth
        document.getElementById("btn-auth").addEventListener("click", () => window.api.runAuth(ws.id));
        document.getElementById("btn-auth-save").addEventListener("click", () => window.api.signalAuth(ws.id));

        // Load existing logs
        window.api.getLogs(ws.id).then((existingLogs) => {
          existingLogs.forEach((msg) => appendLogToPanel(msg));
        });
      }

      // --- Append log ---
      function appendLogToPanel(message) {
        const controlLogs = document.getElementById("control-logs");
        const fullLogs = document.getElementById("full-logs");
        if (!controlLogs || !fullLogs) return;

        const div = document.createElement("div");
        div.className = "log-entry" + (message.includes("ERROR") ? " error" : "");
        div.textContent = message;

        controlLogs.appendChild(div.cloneNode(true));
        fullLogs.appendChild(div);
        controlLogs.scrollTop = controlLogs.scrollHeight;
        fullLogs.scrollTop = fullLogs.scrollHeight;
      }

      // --- Events ---
      window.api.onLog((data) => {
        if (data.workspaceId === activeWsId) {
          appendLogToPanel(data.message);
        }
      });

      window.api.onSyncStatus((status) => {
        statuses[status.workspaceId] = status;
        renderSidebar();
        if (status.workspaceId === activeWsId) {
          const badge = document.querySelector(".status-badge");
          if (badge) {
            badge.textContent = status.running ? "Running" : "Stopped";
            badge.className = `status-badge ${status.running ? "running" : "stopped"}`;
          }
        }
      });

      // --- Add workspace ---
      document.getElementById("btn-add-ws").addEventListener("click", async () => {
        const id = "ws-" + Date.now();
        const ws = {
          id,
          name: "New Workspace",
          slackUrl: "",
          vault: "",
          channels: "",
          intervalMinutes: 30,
          autoSync: false,
          syncDMs: true,
          syncGroups: true,
        };
        await window.api.saveWorkspace(ws);
        workspaces = await window.api.getWorkspaces();
        selectWorkspace(id);
      });

      // --- Startup checkbox ---
      document.getElementById("chk-startup").addEventListener("change", (e) => {
        window.api.setLoginAtStartup(e.target.checked);
      });

      // --- Init ---
      (async () => {
        workspaces = await window.api.getWorkspaces();
        statuses = await window.api.getAllStatuses();
        const startupEnabled = await window.api.getLoginAtStartup();
        document.getElementById("chk-startup").checked = startupEnabled;

        renderSidebar();
        if (workspaces.length > 0) {
          selectWorkspace(workspaces[0].id);
        }
      })();
    </script>
  </body>
</html>
